name: CI

on:
  push:
    branches:
      - main
      - "pull-request/[0-9]+"
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"

jobs:
  pre-commit:
    name: Pre-commit Checks
    runs-on: linux-amd64-cpu4
    permissions:
      contents: read
      packages: read
    container:
      image: ghcr.io/nvidia/dsx-cds-tools:latest
      credentials:
        username: ${{ secrets.GHCR_READ_USER }}
        password: ${{ secrets.GHCR_READ_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: uv sync

      - name: Run pre-commit
        run: make pre-commit
