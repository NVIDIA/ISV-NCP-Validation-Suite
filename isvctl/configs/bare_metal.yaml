# Bare Metal Validation Configuration
# For standalone servers without orchestration (no K8s, no Slurm)
#
# Usage:
#   isvctl test run -f isvctl/configs/bare_metal.yaml
#   isvctl test run -f isvctl/configs/bare_metal.yaml -- -v -s

version: "1.0"

# =============================================================================
# Lifecycle Commands
# =============================================================================
commands:
  bare_metal:
    phases: ["setup", "test", "teardown"]
    steps:
      - name: setup
        phase: setup
        command: "./stubs/bare_metal/setup.sh"
        timeout: 120
      - name: teardown
        phase: teardown
        command: "./stubs/bare_metal/teardown.sh"
        timeout: 30

# =============================================================================
# Test Configuration
# =============================================================================
tests:
  cluster_name: "{{steps.setup.cluster_name}}"
  description: "Bare metal server validation"
  platform: bare_metal

  settings:
    show_skipped_tests: false

  validations:
    bare_metal:
      checks:
        - BmDriverVersion:
            min_version: "{{ steps.setup.bare_metal.driver_version | default('580.0') }}"
        - BmCudaVersion:
            min_version: "12.0"
        - BmGpuDetection:
            expected_count: "{{ steps.setup.bare_metal.gpu_count | default(1, true) }}"
        - BmGpuHealth: {}
        - BmGpuComputeCapability:
            expected_compute_capability: "8.0"

  exclude:
    markers: []
