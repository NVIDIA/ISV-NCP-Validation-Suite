# OpenShift Security & Compliance Validation
#
# Read-only checks against existing nodes:
# - SELinux enforcing mode
# - Secure Boot enabled
# - FIPS mode enabled
# - Compliance Operator scan results
#
# Usage:
#   isvctl test run -f isvctl/configs/openshift/security.yaml

version: "1.0"

commands:
  openshift:
    phases: ["setup", "test", "teardown"]
    steps:
      - name: selinux_check
        phase: test
        command: "python3 ../stubs/openshift/security/selinux_check.py"
        timeout: 120

      - name: secure_boot_check
        phase: test
        command: "python3 ../stubs/openshift/security/secure_boot_check.py"
        timeout: 120

      - name: fips_check
        phase: test
        command: "python3 ../stubs/openshift/security/fips_check.py"
        timeout: 120

      - name: compliance_scan
        phase: test
        command: "python3 ../stubs/openshift/security/compliance_scan.py"
        timeout: 300

tests:
  platform: openshift
  description: "OpenShift security and compliance validation"

  validations:
    selinux:
      checks:
        - StepSuccessCheck:
            step: selinux_check
    secure_boot:
      checks:
        - StepSuccessCheck:
            step: secure_boot_check
    fips:
      checks:
        - StepSuccessCheck:
            step: fips_check
    compliance:
      checks:
        - StepSuccessCheck:
            step: compliance_scan

  exclude:
    markers: []
