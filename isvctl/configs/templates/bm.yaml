# Bare Metal (BMaaS) Validation - Template
#
# Provider-agnostic validations for bare-metal GPU instance lifecycle:
# launch -> describe -> reboot -> NIM deploy -> teardown -> verify.
# Pair with a provider config that supplies the commands (stubs).
#
# Usage:
#   # Layered: template + provider
#   isvctl test run -f isvctl/configs/templates/bm.yaml -f isvctl/configs/aws/bm.yaml
#
#   # With overrides
#   isvctl test run -f ... --set context.expected_gpus=4 --set context.expected_os=rhel
#
# Context variables (set by provider or --set):
#   context.expected_gpus        — Number of GPUs in the instance (default: 8)
#   context.expected_os          — Expected OS name for SSH checks (default: ubuntu)
#   context.max_reboot_uptime    — Max uptime in seconds after reboot (default: 600)
#   context.gpu_stress_runtime   — GPU stress test duration in seconds (default: 30)
#   context.gpu_stress_memory_gb — GPU stress test memory in GB (default: 16)
#   context.training_steps       — DDP training workload steps (default: 50)
#   context.ping_target          — Ethernet ping target (default: 8.8.8.8)
#   context.nim_prompt           — Prompt for NIM inference check (default: What is CUDA?)
#   context.nim_max_tokens       — Max tokens for NIM inference (default: 50)

version: "1.0"

tests:
  platform: bare_metal
  cluster_name: "{{ context.cluster_name | default('bm-validation') }}"
  description: "Bare metal (BMaaS) GPU validation tests (template)"

  settings:
    show_skipped_tests: false

  # ─── Validations ─────────────────────────────────────────────────
  # These are PROVIDER-AGNOSTIC. They only check JSON field names/values.
  validations:
    setup_checks:
      step: launch_instance
      checks:
        - InstanceStateCheck:
            expected_state: "running"

    list_instances:
      step: list_instances
      checks:
        - InstanceListCheck:
            min_count: 1

    instance_info:
      step: describe_instance
      checks:
        - InstanceStateCheck:
            expected_state: "running"

    ssh:
      step: describe_instance
      checks:
        - SshConnectivityCheck: {}
        - SshOsCheck:
            expected_os: "{{ context.expected_os | default('ubuntu') }}"

    gpu:
      step: describe_instance
      checks:
        - SshGpuCheck:
            expected_gpus: "{{ context.expected_gpus | default('8') }}"

    host_os:
      step: describe_instance
      checks:
        - SshHostSoftwareCheck: {}

    # GPU stress test - PyTorch matrix multiplications on all GPUs
    gpu_stress:
      step: describe_instance
      checks:
        - SshGpuStressCheck:
            runtime: "{{ context.gpu_stress_runtime | default('30') }}"
            memory_gb: "{{ context.gpu_stress_memory_gb | default('16') }}"

    # NCCL AllReduce - validates GPU-to-GPU communication (NVLink/NVSwitch)
    nccl:
      step: describe_instance
      checks:
        - SshNcclCheck: {}

    # DDP training workload - validates full training stack
    training:
      step: describe_instance
      checks:
        - SshTrainingCheck:
            steps: "{{ context.training_steps | default('50') }}"

    # Network / interconnect checks
    nvlink:
      step: describe_instance
      checks:
        - SshNvlinkCheck: {}

    infiniband:
      step: describe_instance
      checks:
        - SshInfiniBandCheck: {}

    ethernet:
      step: describe_instance
      checks:
        - SshEthernetCheck:
            ping_target: "{{ context.ping_target | default('8.8.8.8') }}"

    reboot_checks:
      step: reboot_instance
      checks:
        - InstanceRebootCheck:
            max_uptime: "{{ context.max_reboot_uptime | default('600') }}"

    reboot_state:
      step: reboot_instance
      checks:
        - InstanceStateCheck:
            expected_state: "running"

    reboot_ssh:
      step: reboot_instance
      checks:
        - SshConnectivityCheck: {}
        - SshOsCheck:
            expected_os: "{{ context.expected_os | default('ubuntu') }}"

    reboot_gpu:
      step: reboot_instance
      checks:
        - SshGpuCheck:
            expected_gpus: "{{ context.expected_gpus | default('8') }}"

    reboot_host_os:
      step: reboot_instance
      checks:
        - SshHostSoftwareCheck: {}

    # Reinstall validations (skipped when reinstall_instance step is skipped)
    reinstall_state:
      step: reinstall_instance
      checks:
        - InstanceStateCheck:
            expected_state: "running"

    reinstall_ssh:
      step: reinstall_instance
      checks:
        - SshConnectivityCheck: {}
        - SshOsCheck:
            expected_os: "{{ context.expected_os | default('ubuntu') }}"

    reinstall_gpu:
      step: reinstall_instance
      checks:
        - SshGpuCheck: {}

    nim_health:
      step: deploy_nim
      checks:
        - SshNimHealthCheck: {}

    nim_models:
      step: deploy_nim
      checks:
        - SshNimModelCheck: {}

    nim_inference:
      step: deploy_nim
      checks:
        - SshNimInferenceCheck:
            prompt: "{{ context.nim_prompt | default('What is CUDA?') }}"
            max_tokens: "{{ context.nim_max_tokens | default('50') }}"

    nim_teardown:
      step: teardown_nim
      checks:
        - StepSuccessCheck: {}

    teardown_checks:
      step: teardown
      checks:
        - StepSuccessCheck: {}

    sanitization:
      step: verify_teardown
      checks:
        - StepSuccessCheck: {}

  exclude:
    markers: []
