# Control Plane Validation - Template
#
# Provider-agnostic validations for cloud control plane operations:
# API health, access key lifecycle, and tenant management.
# Pair with a provider config that supplies the commands (stubs).
#
# Usage:
#   # Layered: template + provider
#   isvctl test run -f isvctl/configs/templates/control-plane.yaml -f isvctl/configs/aws/control-plane.yaml
#
#   # With overrides
#   isvctl test run -f ... --set context.region=eu-west-1
#
# Context variables (set by provider or --set):
#   context.region     — Cloud region for API calls (default: us-west-2)
#   context.services   — Comma-separated services to check (default: compute,storage,identity)

version: "1.0"

tests:
  platform: control_plane
  cluster_name: "{{ context.cluster_name | default('control-plane-validation') }}"
  description: "Control plane: API health, access key lifecycle, tenant lifecycle (template)"

  settings:
    show_skipped_tests: false

  # ─── Validations ─────────────────────────────────────────────────
  # These are PROVIDER-AGNOSTIC. They only check JSON field names/values.
  validations:
    api_health:
      step: check_api
      checks:
        - FieldExistsCheck:
            fields: ["account_id", "tests"]
        - FieldValueCheck:
            field: "success"
            expected: true

    setup_checks:
      checks:
        - AccessKeyCreatedCheck:
            step: create_access_key
        - TenantCreatedCheck:
            step: create_tenant

    access_key_lifecycle:
      checks:
        - AccessKeyAuthenticatedCheck:
            step: test_access_key
        - AccessKeyDisabledCheck:
            step: disable_access_key
        - AccessKeyRejectedCheck:
            step: verify_key_rejected

    tenant_lifecycle:
      checks:
        - TenantListedCheck:
            step: list_tenants
        - TenantInfoCheck:
            step: get_tenant

    teardown_checks:
      checks:
        - StepSuccessCheck:
            step: delete_access_key
        - StepSuccessCheck:
            step: delete_tenant

  exclude:
    markers: []
