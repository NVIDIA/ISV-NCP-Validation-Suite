# IAM User Lifecycle Validation - Template
#
# Provider-agnostic validations for user account create -> verify -> delete
# lifecycle. Pair with a provider config that supplies the commands (stubs).
#
# Usage:
#   # Layered: template + provider
#   isvctl test run -f isvctl/configs/templates/iam.yaml -f isvctl/configs/aws/iam.yaml
#
#   # With overrides
#   isvctl test run -f ... --set context.region=eu-west-1
#
# Context variables (set by provider or --set):
#   context.region   — Cloud region for IAM calls (default: us-west-2)

version: "1.0"

tests:
  cluster_name: "{{ context.cluster_name | default('iam-validation') }}"
  description: "IAM user lifecycle validation (template)"
  platform: iam

  settings:
    show_skipped_tests: false

  # ─── Validations ─────────────────────────────────────────────────
  # These are PROVIDER-AGNOSTIC. They only check JSON field names/values.
  validations:
    setup_checks:
      step: create_user
      checks:
        - FieldExistsCheck:
            fields: ["username", "access_key_id"]
        - StepSuccessCheck: {}

    credentials:
      step: test_credentials
      checks:
        - FieldExistsCheck:
            field: "account_id"
        - StepSuccessCheck: {}

    teardown_checks:
      step: teardown
      checks:
        - StepSuccessCheck: {}

  exclude:
    markers: []
