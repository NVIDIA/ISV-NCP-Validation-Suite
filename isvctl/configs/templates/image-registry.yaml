# Image Registry Validation - Template
#
# Provider-agnostic validations for image registry lifecycle:
# OS image upload, VM launch from image, install config CRUD,
# and BMaaS provisioning from images and configs.
# Pair with a provider config that supplies the commands (stubs).
#
# Usage:
#   # Layered: template + provider
#   isvctl test run -f isvctl/configs/templates/image-registry.yaml -f isvctl/configs/aws/image-registry.yaml
#
#   # With overrides
#   isvctl test run -f ... --set context.expected_os=rhel
#
# Context variables (set by provider or --set):
#   context.expected_os  — Expected OS name for SSH checks (default: ubuntu)

version: "1.0"

tests:
  cluster_name: "{{ context.cluster_name | default('image-registry-validation') }}"
  description: "Image registry validation tests (template)"
  platform: image_registry

  settings:
    show_skipped_tests: false

  # ─── Validations ─────────────────────────────────────────────────
  # These are PROVIDER-AGNOSTIC. They only check JSON field names/values.
  validations:
    # --- OS Image Upload ---
    image_upload:
      step: upload_image
      checks:
        - StepSuccessCheck: {}
        - FieldExistsCheck:
            fields: ["image_id", "storage_bucket", "disk_ids"]

    # --- VM Launch from Image ---
    vm_from_image:
      step: launch_instance
      checks:
        - StepSuccessCheck: {}
        - FieldExistsCheck:
            fields: ["instance_id", "public_ip", "key_path"]
        - InstanceStateCheck:
            expected_state: "running"

    vm_ssh:
      step: launch_instance
      checks:
        - SshConnectivityCheck: {}
        - SshOsCheck:
            expected_os: "{{ context.expected_os | default('ubuntu') }}"

    # --- OS Install Config CRUD ---
    install_config_crud:
      step: crud_install_config
      checks:
        - StepSuccessCheck: {}
        - FieldExistsCheck:
            fields: ["config_id", "config_name", "operations"]

    # --- OS Image on BMaaS ---
    bm_from_image:
      step: install_image_bm
      checks:
        - StepSuccessCheck: {}
        - FieldExistsCheck:
            fields: ["instance_id", "image_id", "instance_state"]
        - InstanceStateCheck:
            expected_state: "running"

    # --- OS Install Config on BMaaS ---
    bm_from_config:
      step: install_config_bm
      checks:
        - StepSuccessCheck: {}
        - FieldExistsCheck:
            fields: ["instance_id", "config_id", "instance_state"]
        - InstanceStateCheck:
            expected_state: "running"

    teardown_checks:
      step: teardown
      checks:
        - StepSuccessCheck: {}

  exclude:
    markers: []
