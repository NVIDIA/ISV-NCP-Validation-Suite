# Kubernetes-as-a-Service (KaaS) Cluster Validation - Template
#
# Provider-agnostic validations for GPU-enabled Kubernetes clusters.
# Pair with a provider config that supplies the commands (stubs).
#
# Usage:
#   # Layered: template + provider
#   isvctl test run -f isvctl/configs/templates/kaas.yaml -f isvctl/configs/aws/eks.yaml
#
#   # With overrides
#   isvctl test run -f ... --set context.node_count=5 --set context.total_gpus=4
#
# Context variables (set by provider or --set):
#   context.node_count       — Expected node count (default: 3)
#   context.gpu_per_node     — GPUs per node (default: 1)
#   context.total_gpus       — Total GPUs in cluster (default: 3)
#   context.gpu_node_count   — Number of GPU nodes (default: 1)
#   context.runtime_class    — RuntimeClass for GPU pods (default: nvidia)
#   context.driver_version   — Expected NVIDIA driver version (default: 570.195.03)
#   context.gpu_operator_ns  — GPU Operator namespace (default: gpu-operator)
#   context.min_nccl_bw      — Min NCCL bus bandwidth in Gbps (default: 100)

version: "1.0"

tests:
  cluster_name: "{{ context.cluster_name | default('') }}"
  description: "Kubernetes GPU cluster validation"
  platform: kubernetes

  settings:
    show_skipped_tests: false

  validations:
    kubernetes:
      - K8sNodeCountCheck:
          count: "{{ context.node_count | default('3') }}"
      - K8sNodeReadyCheck:
          require_all_ready: true
      - K8sNvidiaSmiCheck:
          runtime_class: "{{ context.runtime_class | default('nvidia') }}"
      - K8sDriverVersionCheck:
          driver_version: "{{ context.driver_version | default('570.195.03') }}"
          runtime_class: "{{ context.runtime_class | default('nvidia') }}"
      - K8sGpuPodAccessCheck:
          gpu_count: 1
          total_gpu_count: "{{ context.gpu_node_count | default('1') }}"
          runtime_class: "{{ context.runtime_class | default('nvidia') }}"
      - K8sGpuCapacityCheck:
          resource_name: "nvidia.com/gpu"
          expected_per_node: "{{ context.gpu_per_node | default('1') }}"
          expected_total: "{{ context.total_gpus | default('3') }}"
      - K8sGpuOperatorNamespaceCheck:
          namespace: "{{ context.gpu_operator_ns | default('gpu-operator') }}"
      - K8sGpuOperatorPodsCheck:
          namespace: "{{ context.gpu_operator_ns | default('gpu-operator') }}"
      - K8sGpuLabelsCheck:
          label_selector: "nvidia.com/gpu.present=true"
      - K8sPodHealthCheck:
          ignore_phases: ["Pending"]
      - K8sNoPendingPodsCheck: {}
      - K8sNoErrorPodsCheck:
          error_states: ["Error", "CrashLoopBackOff"]

    k8s_workloads:
      - K8sNcclWorkload:
          min_bus_bw_gbps: "{{ context.min_nccl_bw | default('100') }}"
      - K8sGpuStressWorkload:
          memory_gb: 1
          runtime: 30
      - K8sNimInferenceWorkload:
          timeout: 1500
      - K8sNimHelmWorkload-1b:
          model: "meta/llama-3.2-1b-instruct"
          model_tag: "latest"
          gpu_count: 1
          timeout: 900
          genai_perf_requests: 100
          genai_perf_concurrency: 4
      - K8sNimHelmWorkload-3b:
          model: "meta/llama-3.2-3b-instruct"
          model_tag: "latest"
          gpu_count: 1
          timeout: 1800
          genai_perf_requests: 200
          genai_perf_concurrency: 8

  exclude:
    markers: []
