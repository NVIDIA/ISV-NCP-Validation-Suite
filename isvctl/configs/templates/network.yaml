# Network Validation - Template
#
# Provider-agnostic validations for comprehensive network testing:
# VPC CRUD, subnet configuration, VPC isolation, security blocking,
# connectivity, and traffic validation.
# Pair with a provider config that supplies the commands (stubs).
#
# Usage:
#   # Layered: template + provider
#   isvctl test run -f isvctl/configs/templates/network.yaml -f isvctl/configs/aws/network.yaml
#
#   # With overrides
#   isvctl test run -f ... --set context.region=eu-west-1 --set context.min_subnets=3
#
# Context variables (set by provider or --set):
#   context.region       — Cloud region for network calls (default: us-west-2)
#   context.min_subnets  — Minimum subnets for setup check (default: 2)
#   context.subnet_count — Expected subnet count for subnet config test (default: 4)

version: "1.0"

tests:
  cluster_name: "{{ context.cluster_name | default('network-validation') }}"
  description: "Network validation tests (template)"
  platform: network

  settings:
    show_skipped_tests: false

  # ─── Validations ─────────────────────────────────────────────────
  # These are PROVIDER-AGNOSTIC. They only check JSON field names/values.
  validations:
    setup_checks:
      step: create_network
      checks:
        - NetworkProvisionedCheck:
            require_subnets: true
            min_subnets: "{{ context.min_subnets | default('2') }}"

    network:
      checks:
        - VpcCrudCheck:
            step: vpc_crud
        - SubnetConfigCheck:
            step: subnet_config
            min_subnets: "{{ context.subnet_count | default('4') }}"
            require_multi_az: true
        - VpcIsolationCheck:
            step: vpc_isolation
        - SecurityBlockingCheck:
            step: security_blocking
        - NetworkConnectivityCheck:
            step: connectivity_test
        - TrafficFlowCheck:
            step: traffic_validation

    teardown_checks:
      step: teardown
      checks:
        - StepSuccessCheck: {}

  exclude:
    markers: []
