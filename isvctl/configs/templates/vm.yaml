# VM (Virtual Machine) Validation - Template
#
# Provider-agnostic validations for GPU virtual machine lifecycle:
# launch -> verify -> reboot -> NIM deploy -> teardown.
# Pair with a provider config that supplies the commands (stubs).
#
# Usage:
#   # Layered: template + provider
#   isvctl test run -f isvctl/configs/templates/vm.yaml -f isvctl/configs/aws/vm.yaml
#
#   # With overrides
#   isvctl test run -f ... --set context.expected_gpus=4 --set context.expected_os=rhel
#
# Context variables (set by provider or --set):
#   context.expected_gpus      — Number of GPUs in the VM (default: 1)
#   context.expected_os        — Expected OS name for SSH checks (default: ubuntu)
#   context.max_reboot_uptime  — Max uptime in seconds after reboot (default: 600)
#   context.nim_prompt         — Prompt for NIM inference check (default: What is CUDA?)
#   context.nim_max_tokens     — Max tokens for NIM inference (default: 50)

version: "1.0"

tests:
  platform: vm
  cluster_name: "{{ context.cluster_name | default('vm-validation') }}"
  description: "VM (virtual machine) GPU validation tests (template)"

  settings:
    show_skipped_tests: false

  # ─── Validations ─────────────────────────────────────────────────
  # These are PROVIDER-AGNOSTIC. They only check JSON field names/values.
  validations:
    setup_checks:
      step: launch_instance
      checks:
        - InstanceStateCheck:
            expected_state: "running"

    list_instances:
      step: list_instances
      checks:
        - InstanceListCheck:
            min_count: 1

    ssh:
      step: launch_instance
      checks:
        - SshConnectivityCheck: {}
        - SshOsCheck:
            expected_os: "{{ context.expected_os | default('ubuntu') }}"

    gpu:
      step: launch_instance
      checks:
        - SshGpuCheck:
            expected_gpus: "{{ context.expected_gpus | default('1') }}"

    host_os:
      step: launch_instance
      checks:
        - SshVcpuPinningCheck: {}
        - SshPciBusCheck:
            expected_gpus: "{{ context.expected_gpus | default('1') }}"
        - SshHostSoftwareCheck: {}

    reboot_checks:
      step: reboot_instance
      checks:
        - InstanceRebootCheck:
            max_uptime: "{{ context.max_reboot_uptime | default('600') }}"

    reboot_state:
      step: reboot_instance
      checks:
        - InstanceStateCheck:
            expected_state: "running"

    reboot_ssh:
      step: reboot_instance
      checks:
        - SshConnectivityCheck: {}
        - SshOsCheck:
            expected_os: "{{ context.expected_os | default('ubuntu') }}"

    reboot_gpu:
      step: reboot_instance
      checks:
        - SshGpuCheck:
            expected_gpus: "{{ context.expected_gpus | default('1') }}"

    reboot_host_os:
      step: reboot_instance
      checks:
        - SshVcpuPinningCheck: {}
        - SshPciBusCheck:
            expected_gpus: "{{ context.expected_gpus | default('1') }}"
        - SshHostSoftwareCheck: {}

    nim_health:
      step: deploy_nim
      checks:
        - SshNimHealthCheck: {}

    nim_models:
      step: deploy_nim
      checks:
        - SshNimModelCheck: {}

    nim_inference:
      step: deploy_nim
      checks:
        - SshNimInferenceCheck:
            prompt: "{{ context.nim_prompt | default('What is CUDA?') }}"
            max_tokens: "{{ context.nim_max_tokens | default('50') }}"

    nim_teardown:
      step: teardown_nim
      checks:
        - StepSuccessCheck: {}

    teardown_checks:
      step: teardown
      checks:
        - StepSuccessCheck: {}

  exclude:
    markers: []
